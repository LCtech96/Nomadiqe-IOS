<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>Invito Nomadiqe</title>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      if (code) {
        window.location.replace('nomadiqe://invite?code=' + encodeURIComponent(code));
      }
    })();
  </script>
</head>
<body>
  <p>Nomadiqe. Se hai cliccato un link di invito, l'app dovrebbe aprirsi automaticamente.</p>
  <p>Altrimenti apri l'app Nomadiqe e registrati dalla schermata di accesso.</p>
</body>
</html>
